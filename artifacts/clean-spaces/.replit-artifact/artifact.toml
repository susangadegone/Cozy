kind = "web"
previewPath = "/clean-spaces/"
title = "Clean Spaces"
version = "1.0.0"
id = "artifacts/clean-spaces"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/clean-spaces/" ]
localPort = 20013

[services.development]
run = "pnpm --filter @workspace/clean-spaces run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clean-spaces", "run", "build" ]
publicDir = "artifacts/clean-spaces/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20013"
BASE_PATH = "/clean-spaces/"
